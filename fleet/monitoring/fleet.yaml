# monitoring/fleet.yaml
defaultNamespace: cattle-monitoring-system

dependsOn:
  - selector:
      matchLabels:
        app: rancher-monitoring-crd

namespaceLabels:
  cattle.io/os: linux

helm:
  repo: https://charts.rancher.io
  chart: rancher-monitoring
  version: 109.0.1+up80.9.1-rancher.8
  releaseName: rancher-monitoring
  values:
  prometheusOperator:
      serviceMonitor:
        metricRelabelings:
          - action: drop
            regex: "fleet_null_bug_workaround"
            sourceLabels:
              - "__name__"
    prometheus-node-exporter:
      prometheus:
        monitor:
          metricRelabelings:
            - action: drop
              regex: "fleet_null_bug_workaround"
              sourceLabels:
                - "__name__"

    alertmanager:
      serviceMonitor:
        metricRelabelings:
          - action: drop
            regex: "fleet_null_bug_workaround"
            sourceLabels:
              - "__name__"

    grafana:
      serviceMonitor:
        metricRelabelings:
          - action: drop
            regex: "fleet_null_bug_workaround"
            sourceLabels:
              - "__name__"
      persistence:
        enabled: false
    coreDns:
      enabled: false
    kubeApiServer:
      enabled: false
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeEtcd:
      enabled: false
    kubeProxy:
      enabled: false
