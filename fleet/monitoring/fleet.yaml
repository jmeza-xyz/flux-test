# monitoring/fleet.yaml
defaultNamespace: cattle-monitoring-system

dependsOn:
  - selector:
      matchLabels:
        app: rancher-monitoring-crd

namespaceLabels:
  cattle.io/os: linux

helm:
  repo: https://charts.rancher.io
  chart: rancher-monitoring
  version: 109.0.1+up80.9.1-rancher.8
  releaseName: rancher-monitoring
  values:
    prometheus-node-exporter:
      prometheus:
        monitor:
          metricRelabelings:
            - action: drop
              regex: "fleet_null_bug_workaround"
              sourceLabels:
                - __name__
    alertmanager:
      serviceMonitor:
        metricRelabelings:
          - action: drop
            regex: "fleet_null_bug_workaround"
            sourceLabels:
              - __name__
    grafana:
      serviceMonitor:
        metricRelabelings:
          - action: drop
            regex: "fleet_null_bug_workaround"
            sourceLabels:
              - __name__

    coreDns:
      serviceMonitor:
        metricRelabelings:
          - action: drop
            regex: "fleet_null_bug_workaround"
            sourceLabels: [__name__]

    kubelet:
      serviceMonitor:
        metricRelabelings:
          - action: drop
            regex: "fleet_null_bug_workaround"
            sourceLabels: [__name__]

    kubeApiServer:
      serviceMonitor:
        metricRelabelings:
          - action: drop
            regex: "fleet_null_bug_workaround"
            sourceLabels: [__name__]

    kubeControllerManager:
      serviceMonitor:
        metricRelabelings:
          - action: drop
            regex: "fleet_null_bug_workaround"
            sourceLabels: [__name__]

    kubeScheduler:
      serviceMonitor:
        metricRelabelings:
          - action: drop
            regex: "fleet_null_bug_workaround"
            sourceLabels: [__name__]

    kubeEtcd:
      serviceMonitor:
        metricRelabelings:
          - action: drop
            regex: "fleet_null_bug_workaround"
            sourceLabels: [__name__]

    kubeProxy:
      serviceMonitor:
        metricRelabelings:
          - action: drop
            regex: "fleet_null_bug_workaround"
            sourceLabels: [__name__]
